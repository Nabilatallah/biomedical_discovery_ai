services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: biodiscoveryai
      POSTGRES_USER: bdai
      POSTGRES_PASSWORD: bdai_dev_password
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bdai -d biodiscoveryai"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./validation:/validation:ro

  flyway:
    image: flyway/flyway:10
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/flyway/sql/migrations:ro
      - ./seeds:/flyway/sql/seeds:ro
      - ./flyway.conf:/flyway/conf/flyway.conf:ro

  governance-api:
    build:
      context: ./apps/governance-api
    environment:
      DATABASE_URL: postgresql://bdai:bdai_dev_password@postgres:5432/biodiscoveryai
      GOVERNANCE_JWT_ISSUER: https://auth.local/bdai
      GOVERNANCE_JWT_AUDIENCE: biodiscoveryai-governance
      GOVERNANCE_JWT_HS256_SECRET: bdai_dev_jwt_secret_not_for_production
    ports:
      - "8008:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3).read()\""
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  governance-validator:
    build:
      context: ./validation/python
    environment:
      DATABASE_URL: postgresql://bdai:bdai_dev_password@postgres:5432/biodiscoveryai
    depends_on:
      postgres:
        condition: service_healthy
