name: Governance Migration Validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API test dependencies
        working-directory: governance_migration_bundle/apps/governance-api
        run: python -m pip install -r requirements-dev.txt

      - name: Run API security tests
        working-directory: governance_migration_bundle/apps/governance-api
        run: python -m pytest tests

      - name: Scan for committed secrets
        shell: pwsh
        run: ./tools/scan_secrets.ps1

      - name: Lint governance migration bundle
        shell: pwsh
        run: ./tools/lint_governance_migration_bundle.ps1

      - name: Run Docker/Flyway/Postgres validation with warning enforcement
        shell: pwsh
        run: ./tools/validate_governance_with_warning_registry.ps1

      - name: Run backup/restore drill
        shell: pwsh
        run: ./tools/test_backup_restore_drill.ps1

      - name: Run performance baseline
        shell: pwsh
        run: ./tools/run_performance_baseline.ps1 -EventCount 1000

      - name: Generate release evidence packet
        shell: pwsh
        run: ./tools/generate_release_evidence_packet.ps1
